# config.yaml
#OpenClaw配置文件

# 智能体配置
agent:
  name: "FishClaw"
  description: "我的第一个OpenClaw智能体"

# 技能配置
skills:
  - name: "greeting"
    path: "./skills/greeting_skill.py"
    enabled: true
    description: "问候技能"
  
  - name: "file"
    path: "./skills/file_skill.py"
    enabled: true
    description: "文件操作技能"
  
  # 可以继续添加更多技能

# 记忆配置
memory:
  type: "file"           # 记忆类型: file/redis/memory
  path: "./memory"       # 记忆存储路径
  auto_save: true        # 自动保存
  max_history: 50        # 最大历史记录数

# 网关配置
gateway:
  host: "localhost"
  port: 8080
  enable_auth: false     # 是否启用认证（演示版关掉）